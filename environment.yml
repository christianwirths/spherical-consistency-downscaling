name: spherical-consistency-downscaling
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  # Python
  - python=3.10

  # Deep learning
  - pytorch=2.5.1
  - pytorch-cuda=12.1
  - torchvision=0.20.1
  - pytorch-lightning=2.5.5
  - torchmetrics=1.8.2

  # Scientific computing
  - numpy>=1.24
  - scipy>=1.11
  - xarray>=2024.1
  - netcdf4>=1.6
  - pandas>=2.0
  - dask

  # Climate / statistics
  - xclim>=0.47
  - scikit-image>=0.21
  - tqdm

  # Visualisation
  - matplotlib>=3.7

  # Misc
  - toml

  - pip:
    # Diffusion model interface (pinned — API changed in later versions)
    - diffusers==0.14.0
    - huggingface-hub==0.11.1
